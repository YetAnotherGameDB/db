name: Validate JSON

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

jobs:
  validate:
    runs-on: ubuntu-latest
    #container: dcycle/json-lint:latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Validate JSON using Docker
      uses: addnab/docker-run-action@v3
      with:
        image: dcycle/json-lint:latest
        options: -v ${{ github.workspace }}:/work
        run: |
          echo "Linting games.json"
          jsonlint -q /work/games.json
  integrity:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/powershell:7.4-ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run validation script
        run: pwsh .github/scripts/validate-games.ps1

  publish:
    name: Publish to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [validate, integrity]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: github-pages
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build site
        run: |
          mkdir -p _site
          cp games.json _site/games.json
          gzip -9 -c games.json > _site/games.json.gz
          python3 .github/scripts/build-sqlite.py games.json _site/games.db
          cp site/index.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
